name: Open Task

on:
  workflow_dispatch:
    inputs:
      task_id:
        description: "The task id for the corresponding task in Click Up"
        required: true
        
jobs:
  get_task_details:
    runs-on: ubuntu-latest
    outputs:
      task_data: ${{ steps.task_data_step.outputs.task_data }}
    steps:        
      - name: Get Task ClickUp
        env:
          TASK_ID: ${{ github.event.inputs.task_id }}
          API_TOKEN: ${{ secrets.CLICKUP_API_KEY }}
        id: task_data_step
        run: |
            response=$(curl --location "https://api.clickup.com/api/v2/task/${TASK_ID}" \
            --header "Authorization: ${API_TOKEN}")
            echo "task_data=$response" >> "$GITHUB_OUTPUT"

  open_task:
    needs: get_task_details
    runs-on: ubuntu-latest
    steps:
        - name: Say Details
          env:
            TASK_DATA: ${{ needs.get_task_details.outputs.task_data }}
          run: |
            echo "${{ fromJSON('$TASK_DATA').name}}"
            echo "$TASK_DATA"
